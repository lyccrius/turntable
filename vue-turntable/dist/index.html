<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>幸运大转盘 - 指针在上方固定</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
            padding: 20px;
        }
        .container { display: flex; flex-direction: column; align-items: center; }
        .turntable-container {
            background: rgba(255,255,255,0.95);
            border-radius: 50%;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            position: relative;
        }
        canvas { display: block; border-radius: 50%; cursor: pointer; }
        .center-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            color: white;
            font-weight: bold;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        /* 固定指针 - 正上方 */
        .fixed-pointer {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 45px solid #ff4444;
            z-index: 20;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3));
        }
        .fixed-pointer::before {
            content: "▼";
            position: absolute;
            top: -52px;
            left: -11px;
            font-size: 22px;
            color: #ff4444;
        }
        .info-panel {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px;
            margin-top: 30px;
            max-width: 500px;
            width: 100%;
        }
        .user-form {
            margin-bottom: 15px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
        }
        .save-user-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 8px;
            font-size: 14px;
            font-weight: bold;
        }
        .last-result {
            font-size: 16px;
            color: #764ba2;
            font-weight: bold;
            text-align: center;
            margin: 15px 0;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 10px;
        }
        .status {
            padding: 8px;
            border-radius: 10px;
            font-size: 12px;
            text-align: center;
        }
        .status.success { background: #e8f5e9; color: #2e7d32; }
        .status.error { background: #ffebee; color: #c62828; }
        .user-info {
            font-size: 11px;
            color: #999;
            text-align: center;
            margin-top: 8px;
        }
        @media (max-width: 600px) {
            .center-btn { width: 60px; height: 60px; font-size: 18px; }
            .fixed-pointer { top: -22px; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 35px solid #ff4444; }
            .fixed-pointer::before { top: -40px; left: -9px; font-size: 18px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="turntable-container">
        <div class="fixed-pointer"></div>
        <canvas id="wheelCanvas" width="500" height="500"></canvas>
        <div class="center-btn" id="spinBtn">抽</div>
    </div>

    <div class="info-panel">
        <div class="user-form">
            <div class="form-group">
                <input type="text" id="userContact" placeholder="📱 手机号 / 微信号（用于领奖）">
            </div>
            <button class="save-user-btn" id="saveUserBtn">💾 保存联系方式</button>
        </div>
        <div class="last-result" id="lastResult">✨ 填写联系方式后点击抽奖 ✨</div>
        <div class="status success" id="statusMsg">✅ 准备就绪</div>
        <div class="user-info" id="userInfoDisplay"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leancloud-storage@4.6.1/dist/av-min.js"></script>

<script>
    // ==================== LeanCloud 配置 ====================
    const LEANCLOUD_CONFIG = {
        appId: "lypAdm04Ue9NTv3Fq3ONeVgk-MdYXbMMI",
        appKey: "3pDgFD1mhMrcy14dLgsFh5NX"
    };
    
    // ==================== 奖品配置 ====================
    // 注意：奖品按顺时针方向排列，从正上方（0度）开始
    const PRIZES = [
        { name: "特等奖", color: "#FFD700", probability: 1 },
        { name: "一等奖", color: "#FF6B6B", probability: 10 },
        { name: "二等奖", color: "#4ECDC4", probability: 19 },
        { name: "三等奖", color: "#FFE66D", probability: 30 },
        { name: "参与奖", color: "#95E77E", probability: 40 }
    ];
    
    // 计算每个奖品扇区的角度范围（0度 = 正上方，顺时针）
    let segments = [];
    let currentStart = 0;
    for (let i = 0; i < PRIZES.length; i++) {
        const angleSize = (PRIZES[i].probability / 100) * 360;
        segments.push({
            name: PRIZES[i].name,
            color: PRIZES[i].color,
            start: currentStart,
            end: currentStart + angleSize,
            mid: currentStart + angleSize / 2
        });
        currentStart += angleSize;
    }
    
    // ==================== 全局变量 ====================
    let isLeanCloudReady = false;
    let currentUserId = '';
    let userContact = '';
    
    // 转盘相关
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    let isSpinning = false;
    let currentRotation = 0;      // 当前旋转角度（度）
    let animationId = null;
    
    // ==================== LeanCloud 初始化 ====================
    function initLeanCloud() {
        if (typeof AV === 'undefined') {
            setTimeout(initLeanCloud, 500);
            return;
        }
        try {
            AV.init({ appId: LEANCLOUD_CONFIG.appId, appKey: LEANCLOUD_CONFIG.appKey });
            let userId = localStorage.getItem('turntable_userId');
            if (!userId) {
                userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('turntable_userId', userId);
            }
            currentUserId = userId;
            isLeanCloudReady = true;
            console.log('✅ LeanCloud 就绪');
        } catch (error) {
            console.error('LeanCloud 初始化失败:', error);
        }
    }
    
    async function saveToCloud(prizeName) {
        if (!userContact) {
            updateStatus('请先填写联系方式', 'error');
            return false;
        }
        if (!isLeanCloudReady) {
            // 本地备份
            let records = JSON.parse(localStorage.getItem('drawRecords') || '[]');
            records.push({ prize: prizeName, contact: userContact, time: new Date().toISOString() });
            localStorage.setItem('drawRecords', JSON.stringify(records.slice(-50)));
            console.log('📀 本地保存:', prizeName);
            return true;
        }
        try {
            const PrizeRecord = AV.Object.extend('PrizeRecord');
            const record = new PrizeRecord();
            record.set('prize', prizeName);
            record.set('userContact', userContact);
            record.set('userId', currentUserId);
            record.set('timestamp', new Date().toISOString());
            await record.save();
            console.log('✅ 云端保存:', prizeName, userContact);
            updateStatus(`✅ 已保存：${prizeName}`, 'success');
            return true;
        } catch (error) {
            console.error('保存失败:', error);
            updateStatus('保存失败，请检查网络', 'error');
            return false;
        }
    }
    
    function updateStatus(msg, type) {
        const div = document.getElementById('statusMsg');
        div.textContent = msg;
        div.className = 'status ' + (type === 'error' ? 'error' : 'success');
    }
    
    // ==================== 核心：根据指针（正上方0度）判断中奖 ====================
    // 转盘旋转 currentRotation 度后，原本0度的位置现在到了 -currentRotation 度
    // 指针在正上方（0度），所以指针指向的扇区 = 哪个扇区包含 (-currentRotation) mod 360
    function getPrizeAtPointer() {
        // 计算转盘上正对指针的位置（0度对应正上方）
        let pointerAngle = (-currentRotation + 360) % 360;
        
        // 找到包含这个角度的扇区
        for (let i = 0; i < segments.length; i++) {
            const seg = segments[i];
            if (pointerAngle >= seg.start && pointerAngle < seg.end) {
                return seg.name;
            }
        }
        // 边界情况：正好等于 360 度
        if (Math.abs(pointerAngle - 360) < 0.01) return segments[0].name;
        return segments[0].name;
    }
    
    // 根据奖品计算需要旋转到的目标角度（让该奖品对准指针）
    function getTargetRotationForPrize(prizeName) {
        const segment = segments.find(s => s.name === prizeName);
        if (!segment) return 0;
        // 让该扇区的中间位置对准指针
        let targetPointerAngle = segment.mid;
        // 当前指针位置是 (-currentRotation) mod 360
        // 我们需要 (-targetRotation) mod 360 = targetPointerAngle
        // 即 targetRotation = -targetPointerAngle mod 360
        let targetRotation = (360 - targetPointerAngle) % 360;
        return targetRotation;
    }
    
    // 随机抽奖（按概率）
    function randomPrizeByProbability() {
        const rand = Math.random() * 100;
        let cum = 0;
        for (let i = 0; i < PRIZES.length; i++) {
            cum += PRIZES[i].probability;
            if (rand <= cum) return PRIZES[i].name;
        }
        return PRIZES[0].name;
    }
    
    // ==================== 绘制转盘 ====================
    function resizeCanvas() {
        const size = Math.min(window.innerWidth - 80, 500);
        canvas.width = size;
        canvas.height = size;
        drawWheel();
    }
    
    function drawWheel() {
        const size = canvas.width;
        const cx = size / 2;
        const cy = size / 2;
        const radius = size / 2 - 10;
        
        ctx.clearRect(0, 0, size, size);
        
        // 当前旋转角度（弧度）
        let startRad = currentRotation * Math.PI / 180;
        
        for (let i = 0; i < segments.length; i++) {
            const seg = segments[i];
            const angleSize = (seg.end - seg.start) * Math.PI / 180;
            const endRad = startRad + angleSize;
            
            // 绘制扇形
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.arc(cx, cy, radius, startRad, endRad);
            ctx.fillStyle = seg.color;
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 绘制文字
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(startRad + angleSize / 2);
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            const fontSize = Math.floor(size / 18);
            ctx.font = `bold ${fontSize}px "PingFang SC", "Microsoft YaHei"`;
            ctx.fillStyle = "#333";
            ctx.fillText(seg.name, radius * 0.65, 0);
            ctx.restore();
            
            startRad = endRad;
        }
        
        // 中心圆装饰
        ctx.beginPath();
        ctx.arc(cx, cy, radius * 0.12, 0, 2 * Math.PI);
        ctx.fillStyle = "#FFD700";
        ctx.fill();
        ctx.shadowBlur = 0;
    }
    
    // ==================== 抽奖动画 ====================
    function spinWheel() {
        if (isSpinning) return;
        if (!userContact) {
            updateStatus('请先填写联系方式', 'error');
            document.getElementById('userContact').focus();
            return;
        }
        
        // 1. 随机决定中奖奖品
        const prize = randomPrizeByProbability();
        console.log('🎁 目标奖品:', prize);
        
        // 2. 计算目标旋转角度
        const targetRotation = getTargetRotationForPrize(prize);
        
        // 3. 动画：当前角度 -> 目标角度（多转几圈）
        const startRotation = currentRotation;
        // 需要旋转的角度差
        let delta = targetRotation - startRotation;
        if (delta < 0) delta += 360;
        const totalDelta = delta + 360 * 6;  // 多转6圈
        const duration = 3000;
        const startTime = performance.now();
        
        isSpinning = true;
        const spinBtn = document.getElementById('spinBtn');
        spinBtn.style.opacity = '0.6';
        spinBtn.style.pointerEvents = 'none';
        
        function animate(now) {
            const elapsed = now - startTime;
            const t = Math.min(1, elapsed / duration);
            // 缓动
            const easeOut = 1 - Math.pow(1 - t, 3);
            currentRotation = (startRotation + totalDelta * easeOut) % 360;
            drawWheel();
            
            if (t < 1) {
                animationId = requestAnimationFrame(animate);
            } else {
                // 动画完成，精确停在目标角度
                currentRotation = targetRotation;
                drawWheel();
                
                // 验证：实际指针指向的奖品
                const actualPrize = getPrizeAtPointer();
                console.log(`✅ 停止旋转: 目标=${prize}, 实际指针指向=${actualPrize}, 旋转角=${currentRotation.toFixed(1)}°`);
                
                // 保存结果
                saveToCloud(actualPrize);
                
                // 显示结果
                const resultDiv = document.getElementById('lastResult');
                resultDiv.innerHTML = `🎉 恭喜 ${userContact} 获得：${actualPrize} 🎉`;
                updateStatus(`抽中：${actualPrize}，已保存`, 'success');
                
                setTimeout(() => {
                    alert(`🎉 恭喜 ${userContact} 抽中：${actualPrize} 🎉`);
                }, 100);
                
                isSpinning = false;
                spinBtn.style.opacity = '1';
                spinBtn.style.pointerEvents = 'auto';
                cancelAnimationFrame(animationId);
            }
        }
        
        if (animationId) cancelAnimationFrame(animationId);
        animationId = requestAnimationFrame(animate);
    }
    
    // ==================== 初始化 ====================
    function loadUserInfo() {
        const saved = localStorage.getItem('userContact');
        if (saved) {
            userContact = saved;
            document.getElementById('userContact').value = saved;
            document.getElementById('userInfoDisplay').innerHTML = `📞 当前用户：${saved}`;
        }
    }
    
    window.addEventListener('resize', () => { resizeCanvas(); });
    document.getElementById('spinBtn').addEventListener('click', spinWheel);
    document.getElementById('saveUserBtn').addEventListener('click', () => {
        const contact = document.getElementById('userContact').value.trim();
        if (contact) {
            userContact = contact;
            localStorage.setItem('userContact', contact);
            document.getElementById('userInfoDisplay').innerHTML = `📞 当前用户：${contact}`;
            updateStatus('联系方式已保存，可以抽奖啦！', 'success');
        } else {
            updateStatus('请填写手机号或微信号', 'error');
        }
    });
    
    resizeCanvas();
    initLeanCloud();
    loadUserInfo();
    
    console.log('=== 转盘已启动 ===');
    console.log('指针固定在正上方，转盘0度=正上方，顺时针排列奖品');
    console.log('segments:', segments);
</script>
</body>
</html>
