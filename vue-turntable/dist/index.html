<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>幸运大转盘 - 抽奖结果自动记录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', Arial, sans-serif;
            padding: 20px;
        }

        /* 转盘容器 */
        .turntable-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50%;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2), 0 0 0 8px rgba(255, 255, 255, 0.3);
            position: relative;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 50%;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        canvas:active {
            transform: scale(0.98);
        }

        /* 抽奖按钮 */
        .pointer-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3), inset 0 2px 4px rgba(255, 255, 255, 0.5);
            transition: all 0.2s ease;
            z-index: 10;
            color: white;
            font-weight: bold;
            text-align: center;
        }

        .pointer-btn:active {
            transform: translate(-50%, -50%) scale(0.95);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .pointer-btn span:first-child {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .pointer-btn span:last-child {
            font-size: 14px;
            margin-top: 5px;
            opacity: 0.9;
        }

        /* 信息面板 */
        .info-panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            margin-top: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .user-id {
            font-size: 12px;
            color: #666;
            background: #f5f5f5;
            padding: 5px 12px;
            border-radius: 20px;
            word-break: break-all;
        }

        .last-result {
            font-size: 14px;
            color: #764ba2;
            font-weight: bold;
        }

        .status {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            text-align: center;
            margin-top: 10px;
        }

        .status.error {
            background: #ffebee;
            color: #c62828;
        }

        h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
            text-align: center;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        @media (max-width: 600px) {
            .pointer-btn {
                width: 70px;
                height: 70px;
            }
            .pointer-btn span:first-child {
                font-size: 20px;
            }
            .pointer-btn span:last-child {
                font-size: 10px;
            }
            .info-panel {
                margin-top: 20px;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div style="display: flex; flex-direction: column; align-items: center;">
        <!-- 转盘区域 -->
        <div class="turntable-container">
            <canvas id="wheelCanvas" width="500" height="500"></canvas>
            <div class="pointer-btn" id="spinBtn">
                <span>抽奖</span>
                <span>SPIN</span>
            </div>
        </div>

        <!-- 信息面板 -->
        <div class="info-panel">
            <div class="user-info">
                <span class="user-id" id="userIdDisplay">加载中...</span>
                <button id="copyIdBtn">复制ID</button>
            </div>
            <div class="last-result" id="lastResult">上次结果：未抽奖</div>
            <div class="status" id="statusMsg">✅ 准备就绪，点击转盘抽奖</div>
        </div>
    </div>

    <!-- LeanCloud SDK -->
    <script src="https://cdn.jsdelivr.net/npm/leancloud-storage@4.6.1/dist/av-min.js"></script>
    //<script src="https://cdn.jsdelivr.net/npm/leancloud-storage@5.0.5/dist/av-min.js"></script>
    
    <script>
        // ==================== 配置区域 ====================
        // 【重要】请替换成您的 LeanCloud 真实配置
        const LEANCLOUD_CONFIG = {
            appId: "lypAdm04Ue9NTv3Fq3ONeVgk-MdYXbMMI",           // 替换为您的 App ID
            appKey: "3pDgFD1mhMrcy14dLgsFh5NX",          // 替换为您的 App Key
            serverURL: "https://api.lyccri.us"  // 国内版必填，国际版可注释或删除此行
        };
        
        // 奖品配置（按顺时针顺序，从0°开始）
        const PRIZES = [
            { name: "特等奖", color: "#FF6B6B", probability: 1 },
            { name: "一等奖", color: "#FF6B6B", probability: 10 },
            { name: "二等奖", color: "#4ECDC4", probability: 19 },
            { name: "三等奖", color: "#FFE66D", probability: 30 },
            { name: "参与奖", color: "#95E77E", probability: 40 }
        ];
        
        // 计算每个奖品对应的角度区间（基于概率）
        let segments = [];
        let currentAngle = 0;
        for (let prize of PRIZES) {
            const angleSize = (prize.probability / 100) * 360;
            segments.push({
                name: prize.name,
                color: prize.color,
                start: currentAngle,
                end: currentAngle + angleSize,
                probability: prize.probability
            });
            currentAngle += angleSize;
        }
        
        // ==================== 初始化 LeanCloud ====================
        let isLeanCloudReady = false;
        let currentUserId = '';
        
        try {
            // 配置 LeanCloud
            const avConfig = { appId: LEANCLOUD_CONFIG.appId, appKey: LEANCLOUD_CONFIG.appKey };
            if (LEANCLOUD_CONFIG.serverURL && LEANCLOUD_CONFIG.serverURL !== "https://您的专属域名.leanapp.cn") {
                avConfig.serverURL = LEANCLOUD_CONFIG.serverURL;
            }
            AV.init(avConfig);
            
            // 生成或读取用户ID
            let userId = localStorage.getItem('turntable_userId');
            if (!userId) {
                userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('turntable_userId', userId);
            }
            currentUserId = userId;
            document.getElementById('userIdDisplay').innerText = `ID: ${userId.substr(0, 16)}...`;
            
            isLeanCloudReady = true;
            updateStatus('✅ LeanCloud 已连接，抽奖结果将自动保存', 'success');
        } catch (error) {
            console.error('LeanCloud 初始化失败:', error);
            updateStatus('⚠️ LeanCloud 初始化失败，抽奖结果将仅保存在本地', 'error');
            isLeanCloudReady = false;
            currentUserId = 'local_' + Date.now();
            document.getElementById('userIdDisplay').innerText = `本地模式: ${currentUserId.substr(0, 16)}...`;
        }
        
        // 保存抽奖结果到 LeanCloud
        async function savePrizeResult(prizeName, angle) {
            if (!isLeanCloudReady) {
                console.log('本地模式，未上传:', prizeName);
                return false;
            }
            
            try {
                const PrizeRecord = AV.Object.extend('PrizeRecord');
                const record = new PrizeRecord();
                record.set('prize', prizeName);
                record.set('userId', currentUserId);
                record.set('angle', angle);
                record.set('timestamp', new Date().toISOString());
                record.set('userAgent', navigator.userAgent.substring(0, 200));
                
                await record.save();
                console.log('✅ 抽奖结果已保存:', prizeName);
                updateStatus(`✅ 已保存: ${prizeName}`, 'success');
                return true;
            } catch (error) {
                console.error('保存失败:', error);
                updateStatus(`❌ 保存失败: ${error.message}`, 'error');
                return false;
            }
        }
        
        // 更新状态显示
        function updateStatus(message, type = 'info') {
            const statusDiv = document.getElementById('statusMsg');
            statusDiv.textContent = message;
            statusDiv.className = 'status';
            if (type === 'error') {
                statusDiv.classList.add('error');
            }
        }
        
        // ==================== 转盘绘制逻辑 ====================
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        let isSpinning = false;
        let currentRotation = 0;
        let animationId = null;
        
        // 调整画布大小适配屏幕
        function resizeCanvas() {
            const size = Math.min(window.innerWidth - 80, 500);
            canvas.width = size;
            canvas.height = size;
            canvas.style.width = `${size}px`;
            canvas.style.height = `${size}px`;
            drawWheel();
        }
        
        // 绘制转盘
        function drawWheel() {
            const size = canvas.width;
            const centerX = size / 2;
            const centerY = size / 2;
            const radius = size / 2 - 10;
            
            ctx.clearRect(0, 0, size, size);
            
            // 绘制每个扇形
            let startAngle = currentRotation * Math.PI / 180;
            for (let i = 0; i < segments.length; i++) {
                const segment = segments[i];
                const angleSize = (segment.end - segment.start) * Math.PI / 180;
                const endAngle = startAngle + angleSize;
                
                // 绘制扇形
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.fillStyle = segment.color;
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // 绘制文字
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + angleSize / 2);
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                const textRadius = radius * 0.65;
                ctx.font = `bold ${Math.floor(size / 20)}px "PingFang SC", "Microsoft YaHei"`;
                ctx.fillStyle = "#333";
                ctx.shadowBlur = 0;
                ctx.fillText(segment.name, textRadius, 0);
                ctx.restore();
                
                startAngle = endAngle;
            }
            
            // 绘制中心小圆装饰
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius * 0.12, 0, 2 * Math.PI);
            ctx.fillStyle = "#FFD700";
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        // 抽奖逻辑（基于概率）
        function getRandomPrize() {
            const random = Math.random() * 100;
            let cumulative = 0;
            for (let i = 0; i < PRIZES.length; i++) {
                cumulative += PRIZES[i].probability;
                if (random <= cumulative) {
                    return PRIZES[i].name;
                }
            }
            return PRIZES[0].name;
        }
        
        // 执行抽奖旋转动画
        function spinWheel() {
            if (isSpinning) return;
            
            const prize = getRandomPrize();
            // 找到奖品对应的索引
            const prizeIndex = PRIZES.findIndex(p => p.name === prize);
            const targetSegment = segments[prizeIndex];
            
            // 计算需要旋转到的目标角度（让指针指在扇区中间）
            const targetRotation = (360 - (targetSegment.start + (targetSegment.end - targetSegment.start) / 2)) % 360;
            
            // 随机增加多圈旋转
            const spins = 360 * 8 + targetRotation;
            const startRotation = currentRotation;
            const duration = 3000;
            const startTime = performance.now();
            
            isSpinning = true;
            document.getElementById('spinBtn').style.opacity = '0.6';
            document.getElementById('spinBtn').style.pointerEvents = 'none';
            
            function animate(now) {
                const elapsed = now - startTime;
                const t = Math.min(1, elapsed / duration);
                // 缓动函数 easeOutCubic
                const easeOut = 1 - Math.pow(1 - t, 3);
                currentRotation = (startRotation + spins * easeOut) % 360;
                drawWheel();
                
                if (t < 1) {
                    animationId = requestAnimationFrame(animate);
                } else {
                    // 动画完成
                    currentRotation = (startRotation + spins) % 360;
                    drawWheel();
                    
                    // 保存结果并显示
                    savePrizeResult(prize, currentRotation);
                    document.getElementById('lastResult').innerHTML = `🎉 恭喜获得：${prize} 🎉`;
                    updateStatus(`🎁 抽中：${prize}，结果已保存`, 'success');
                    
                    // 弹窗提示
                    setTimeout(() => {
                        alert(`恭喜您抽中：${prize}`);
                    }, 100);
                    
                    isSpinning = false;
                    document.getElementById('spinBtn').style.opacity = '1';
                    document.getElementById('spinBtn').style.pointerEvents = 'auto';
                    cancelAnimationFrame(animationId);
                }
            }
            
            if (animationId) cancelAnimationFrame(animationId);
            animationId = requestAnimationFrame(animate);
        }
        
        // ==================== 事件绑定与初始化 ====================
        window.addEventListener('resize', () => {
            resizeCanvas();
        });
        
        document.getElementById('spinBtn').addEventListener('click', spinWheel);
        document.getElementById('copyIdBtn').addEventListener('click', () => {
            navigator.clipboard.writeText(currentUserId).then(() => {
                updateStatus('✅ 用户ID已复制到剪贴板', 'success');
            }).catch(() => {
                updateStatus('⚠️ 复制失败，可手动复制', 'error');
            });
        });
        
        // 启动
        resizeCanvas();
        
        // 显示使用说明
        console.log('转盘已启动，抽奖结果将自动保存到 LeanCloud');
        console.log('用户ID:', currentUserId);
        
        // 添加 LeanCloud 表格创建提示
        if (isLeanCloudReady) {
            setTimeout(() => {
                console.log('%c💡 提示：请在 LeanCloud 控制台创建 Class "PrizeRecord" 来查看抽奖记录', 'color: #764ba2; font-size: 14px');
            }, 1000);
        }
    </script>
</body>
</html>
