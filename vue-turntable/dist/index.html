<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>幸运大转盘 - 抽奖结果自动记录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', Arial, sans-serif;
            padding: 20px;
        }

        /* 转盘容器 */
        .turntable-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50%;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2), 0 0 0 8px rgba(255, 255, 255, 0.3);
            position: relative;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 50%;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        canvas:active {
            transform: scale(0.98);
        }

        /* 抽奖按钮 */
        .pointer-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3), inset 0 2px 4px rgba(255, 255, 255, 0.5);
            transition: all 0.2s ease;
            z-index: 10;
            color: white;
            font-weight: bold;
            text-align: center;
        }

        /* 固定指针（在上方） */
        .fixed-pointer {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #ff4444;
            z-index: 20;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        
        .fixed-pointer::after {
            content: "▼";
            position: absolute;
            top: -48px;
            left: -12px;
            font-size: 24px;
            color: #ff4444;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .pointer-btn:active {
            transform: translate(-50%, -50%) scale(0.95);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .pointer-btn span:first-child {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .pointer-btn span:last-child {
            font-size: 14px;
            margin-top: 5px;
            opacity: 0.9;
        }

        /* 信息面板 */
        .info-panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            margin-top: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        /* 用户信息表单 */
        .user-form {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .form-group {
            margin-bottom: 12px;
        }
        
        .form-group label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 5px;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .form-group input:focus {
            border-color: #764ba2;
        }
        
        .form-group input.error {
            border-color: #c62828;
            background: #ffebee;
        }
        
        .save-user-btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            margin-top: 5px;
        }
        
        .user-info-display {
            background: #f5f5f5;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 12px;
            color: #666;
            margin-top: 10px;
            text-align: center;
        }

        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .last-result {
            font-size: 14px;
            color: #764ba2;
            font-weight: bold;
            text-align: center;
            margin: 10px 0;
        }

        .status {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            text-align: center;
            margin-top: 10px;
        }

        .status.error {
            background: #ffebee;
            color: #c62828;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: opacity 0.2s;
        }

        @media (max-width: 600px) {
            .pointer-btn {
                width: 70px;
                height: 70px;
            }
            .pointer-btn span:first-child {
                font-size: 20px;
            }
            .pointer-btn span:last-child {
                font-size: 10px;
            }
            .info-panel {
                margin-top: 20px;
                padding: 15px;
            }
            .fixed-pointer {
                top: -20px;
                border-left: 15px solid transparent;
                border-right: 15px solid transparent;
                border-top: 30px solid #ff4444;
            }
            .fixed-pointer::after {
                top: -38px;
                left: -9px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div style="display: flex; flex-direction: column; align-items: center;">
        <!-- 转盘区域 -->
        <div class="turntable-container">
            <div class="fixed-pointer"></div>
            <canvas id="wheelCanvas" width="500" height="500"></canvas>
            <div class="pointer-btn" id="spinBtn">
                <span>抽奖</span>
                <span>SPIN</span>
            </div>
        </div>

        <!-- 信息面板 -->
        <div class="info-panel">
            <!-- 用户信息填写区域 -->
            <div class="user-form">
                <div class="form-group">
                    <label>📱 手机号 / 微信号 *</label>
                    <input type="text" id="userContact" placeholder="请填写手机号或微信号，用于领奖" autocomplete="off">
                </div>
                <button class="save-user-btn" id="saveUserBtn">💾 保存我的联系方式</button>
                <div class="user-info-display" id="userInfoDisplay">未填写联系方式</div>
            </div>
            
            <div class="last-result" id="lastResult">✨ 填写联系方式后点击转盘抽奖 ✨</div>
            <div class="status" id="statusMsg">✅ 准备就绪</div>
        </div>
    </div>

    <!-- LeanCloud SDK -->
    <script src="https://cdn.jsdelivr.net/npm/leancloud-storage@4.6.1/dist/av-min.js"></script>
    
    <script>
        // ==================== 配置区域 ====================
        const LEANCLOUD_CONFIG = {
            appId: "lypAdm04Ue9NTv3Fq3ONeVgk-MdYXbMMI",
            appKey: "3pDgFD1mhMrcy14dLgsFh5NX"
        };
        
        // 奖品配置
        const PRIZES = [
            { name: "特等奖", color: "#FFD700", probability: 1 },
            { name: "一等奖", color: "#FF6B6B", probability: 10 },
            { name: "二等奖", color: "#4ECDC4", probability: 19 },
            { name: "三等奖", color: "#FFE66D", probability: 30 },
            { name: "参与奖", color: "#95E77E", probability: 40 }
        ];
        
        // 计算角度区间
        let segments = [];
        let currentAngle = 0;
        for (let prize of PRIZES) {
            const angleSize = (prize.probability / 100) * 360;
            segments.push({
                name: prize.name,
                color: prize.color,
                start: currentAngle,
                end: currentAngle + angleSize,
                probability: prize.probability
            });
            currentAngle += angleSize;
        }
        
        // ==================== 初始化 LeanCloud ====================
        let isLeanCloudReady = false;
        let currentUserId = '';
        let userContact = '';
        
        // 加载保存的用户信息
        function loadUserInfo() {
            const savedContact = localStorage.getItem('userContact');
            if (savedContact) {
                userContact = savedContact;
                document.getElementById('userContact').value = savedContact;
                document.getElementById('userInfoDisplay').innerHTML = `📞 已保存：${savedContact}`;
            }
        }
        
        // 保存用户联系方式
        function saveUserContact() {
            const contact = document.getElementById('userContact').value.trim();
            if (!contact) {
                updateStatus('⚠️ 请填写手机号或微信号', 'error');
                document.getElementById('userContact').classList.add('error');
                return false;
            }
            
            document.getElementById('userContact').classList.remove('error');
            userContact = contact;
            localStorage.setItem('userContact', contact);
            document.getElementById('userInfoDisplay').innerHTML = `📞 已保存：${contact}`;
            updateStatus('✅ 联系方式已保存，可以开始抽奖了', 'success');
            return true;
        }
        
        // 初始化 LeanCloud
        function initLeanCloud() {
            if (typeof AV === 'undefined') {
                console.log('等待 SDK 加载...');
                setTimeout(initLeanCloud, 500);
                return;
            }
            
            console.log('✅ SDK 版本:', AV.version);
            
            try {
                AV.init({
                    appId: LEANCLOUD_CONFIG.appId,
                    appKey: LEANCLOUD_CONFIG.appKey
                });
                
                // 生成唯一用户ID
                let userId = localStorage.getItem('turntable_userId');
                if (!userId) {
                    userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                    localStorage.setItem('turntable_userId', userId);
                }
                currentUserId = userId;
                
                isLeanCloudReady = true;
                console.log('✅ LeanCloud 初始化成功, 用户ID:', currentUserId);
                updateStatus('✅ 已连接云端，请填写联系方式后抽奖', 'success');
            } catch (error) {
                console.error('LeanCloud 初始化失败:', error);
                updateStatus('⚠️ 云端连接失败，抽奖结果将仅保存在本地', 'error');
                isLeanCloudReady = false;
                currentUserId = 'local_' + Date.now();
            }
        }
        
        // 保存抽奖结果到 LeanCloud
        async function savePrizeResult(prizeName, angle) {
            // 检查是否填写了联系方式
            if (!userContact) {
                updateStatus('⚠️ 请先填写手机号/微信号再抽奖', 'error');
                return false;
            }
            
            console.log('开始保存抽奖结果:', prizeName, '用户:', userContact);
            
            const recordData = {
                prize: prizeName,
                userContact: userContact,
                userId: currentUserId,
                angle: angle,
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent.substring(0, 200)
            };
            
            if (!isLeanCloudReady) {
                // 本地保存
                let records = JSON.parse(localStorage.getItem('drawRecords') || '[]');
                records.push(recordData);
                localStorage.setItem('drawRecords', JSON.stringify(records.slice(-50)));
                console.log('📀 本地保存:', recordData);
                return true;
            }
            
            try {
                const PrizeRecord = AV.Object.extend('PrizeRecord');
                const record = new PrizeRecord();
                
                record.set('prize', prizeName);
                record.set('userContact', userContact);
                record.set('userId', currentUserId);
                record.set('angle', angle);
                record.set('timestamp', new Date().toISOString());
                record.set('userAgent', navigator.userAgent.substring(0, 200));
                
                const result = await record.save();
                console.log('✅ 抽奖结果已保存:', prizeName, result.id);
                return true;
            } catch (error) {
                console.error('保存失败:', error);
                updateStatus(`❌ 保存失败: ${error.message}`, 'error');
                return false;
            }
        }
        
        function updateStatus(message, type = 'info') {
            const statusDiv = document.getElementById('statusMsg');
            statusDiv.textContent = message;
            statusDiv.className = 'status';
            if (type === 'error') {
                statusDiv.classList.add('error');
            }
        }
        
        // ==================== 转盘绘制逻辑 ====================
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        let isSpinning = false;
        let currentRotation = 0;
        let animationId = null;
        
        function resizeCanvas() {
            const size = Math.min(window.innerWidth - 80, 500);
            canvas.width = size;
            canvas.height = size;
            canvas.style.width = `${size}px`;
            canvas.style.height = `${size}px`;
            drawWheel();
        }
        
        function drawWheel() {
            const size = canvas.width;
            const centerX = size / 2;
            const centerY = size / 2;
            const radius = size / 2 - 10;
            
            ctx.clearRect(0, 0, size, size);
            
            let startAngle = currentRotation * Math.PI / 180;
            for (let i = 0; i < segments.length; i++) {
                const segment = segments[i];
                const angleSize = (segment.end - segment.start) * Math.PI / 180;
                const endAngle = startAngle + angleSize;
                
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.fillStyle = segment.color;
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + angleSize / 2);
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                const textRadius = radius * 0.65;
                ctx.font = `bold ${Math.floor(size / 20)}px "PingFang SC", "Microsoft YaHei"`;
                ctx.fillStyle = "#333";
                ctx.fillText(segment.name, textRadius, 0);
                ctx.restore();
                
                startAngle = endAngle;
            }
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius * 0.12, 0, 2 * Math.PI);
            ctx.fillStyle = "#FFD700";
            ctx.fill();
        }
        
        function getRandomPrize() {
            const random = Math.random() * 100;
            let cumulative = 0;
            for (let i = 0; i < PRIZES.length; i++) {
                cumulative += PRIZES[i].probability;
                if (random <= cumulative) {
                    return PRIZES[i].name;
                }
            }
            return PRIZES[0].name;
        }
        
        function spinWheel() {
            if (isSpinning) return;
            
            // 检查是否填写了联系方式
            if (!userContact) {
                updateStatus('⚠️ 请先填写手机号/微信号再抽奖', 'error');
                document.getElementById('userContact').classList.add('error');
                return;
            }
            
            const prize = getRandomPrize();
            const prizeIndex = PRIZES.findIndex(p => p.name === prize);
            const targetSegment = segments[prizeIndex];
            const targetRotation = (360 - (targetSegment.start + (targetSegment.end - targetSegment.start) / 2)) % 360;
            const spins = 360 * 8 + targetRotation;
            const startRotation = currentRotation;
            const duration = 3000;
            const startTime = performance.now();
            
            isSpinning = true;
            document.getElementById('spinBtn').style.opacity = '0.6';
            document.getElementById('spinBtn').style.pointerEvents = 'none';
            
            function animate(now) {
                const elapsed = now - startTime;
                const t = Math.min(1, elapsed / duration);
                const easeOut = 1 - Math.pow(1 - t, 3);
                currentRotation = (startRotation + spins * easeOut) % 360;
                drawWheel();
                
                if (t < 1) {
                    animationId = requestAnimationFrame(animate);
                } else {
                    currentRotation = (startRotation + spins) % 360;
                    drawWheel();
                    
                    savePrizeResult(prize, currentRotation);
                    document.getElementById('lastResult').innerHTML = `🎉 恭喜 ${userContact} 获得：${prize} 🎉`;
                    updateStatus(`🎁 抽中：${prize}，结果已保存`, 'success');
                    
                    setTimeout(() => {
                        alert(`恭喜 ${userContact} 抽中：${prize}`);
                    }, 100);
                    
                    isSpinning = false;
                    document.getElementById('spinBtn').style.opacity = '1';
                    document.getElementById('spinBtn').style.pointerEvents = 'auto';
                    cancelAnimationFrame(animationId);
                }
            }
            
            if (animationId) cancelAnimationFrame(animationId);
            animationId = requestAnimationFrame(animate);
        }
        
        // ==================== 事件绑定 ====================
        window.addEventListener('resize', resizeCanvas);
        document.getElementById('spinBtn').addEventListener('click', spinWheel);
        document.getElementById('saveUserBtn').addEventListener('click', saveUserContact);
        document.getElementById('userContact').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') saveUserContact();
        });
        
        resizeCanvas();
        initLeanCloud();
        loadUserInfo();
        
        console.log('转盘已启动');
    </script>
</body>
</html>
